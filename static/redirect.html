<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Redirecting… · Human.ly</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0D1117; color: #E6EDF3; font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .box { text-align: center; }
  .spinner {
    width: 28px; height: 28px; border: 3px solid #30363D; border-top-color: #58A6FF;
    border-radius: 50%; margin: 0 auto 16px; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 14px; color: #8B949E; }
</style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p id="redirect-message">Redirecting you now…</p>
  </div>

  <script>
    // Reads the destination from the query string, e.g.
    // /static/redirect.html?to=https%3A%2F%2Fexample.com%2Fpage
    const params = new URLSearchParams(window.location.search);
    const destination = params.get('to');

    if (destination) {
      window.location.replace(destination);
    } else {
      document.getElementById('redirect-message').textContent =
        'No destination was provided for this redirect.';
    }
  </script>

  <noscript>
    <meta http-equiv="refresh" content="0;url=/static/link-error.html?message=JavaScript+is+required+to+complete+this+redirect&status=200">
  </noscript>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Human.ly — Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D1117;
    --surface: #161B22;
    --surface2: #21262D;
    --border: #30363D;
    --accent: #58A6FF;
    --accent-dim: #1f3a5f;
    --green: #3FB950;
    --green-dim: #1a3625;
    --red: #F85149;
    --red-dim: #3d1a19;
    --amber: #E3B341;
    --amber-dim: #3d2e12;
    --text: #E6EDF3;
    --text2: #8B949E;
    --text3: #6E7681;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .app { display: flex; min-height: 100vh; }

  /* Auth Overlay Screen */
  .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .auth-header { text-align: center; margin-bottom: 24px; }
  .auth-toggle { display: flex; background: var(--surface2); padding: 4px; border-radius: var(--radius); margin-bottom: 24px; }
  .auth-toggle-btn { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text3); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .auth-toggle-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 0 0 1px var(--border); }

  /* Sidebar */
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-brand { padding: 0 20px 24px; border-bottom: 1px solid var(--border); }
  .brand-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .brand-icon i { color: #0D1117; font-size: 18px; }
  .brand-name { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.5px; }
  .brand-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-section { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; margin-top: 16px; }
  .nav-section:first-child { margin-top: 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius); color: var(--text2); cursor: pointer; font-size: 13px; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); }
  .nav-item i { font-size: 16px; width: 16px; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 56px; border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
  .topbar-title { font-size: 15px; font-weight: 500; }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; font-family: var(--mono); }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-amber { background: var(--amber-dim); color: var(--amber); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .content { flex: 1; overflow-y: auto; padding: 28px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .card-sm { padding: 16px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .card-title-lg { font-size: 15px; font-weight: 600; color: var(--text); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }

  /* Stat card */
  .stat-value { font-family: var(--mono); font-size: 28px; font-weight: 600; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* Form elements */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.3px; text-transform: uppercase; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: var(--sans); }
  .btn-primary { background: var(--accent); color: #0D1117; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid transparent; }
  .btn-danger:hover { border-color: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }

  /* Code chip */
  .code-chip { display: inline-flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--accent); border-radius: var(--radius); padding: 10px 16px; font-family: var(--mono); font-size: 14px; color: var(--accent); }
  .code-chip .copy-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 0; font-size: 16px; transition: color 0.15s; }
  .code-chip .copy-btn:hover { color: var(--accent); }

  /* Result box */
  .result-url { font-family: var(--mono); font-size: 13px; color: var(--text2); word-break: break-all; margin-top: 8px; }

  /* Error box */
  .error-box { background: var(--red-dim); border: 1px solid var(--red); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--red); margin-top: 12px; display: flex; align-items: center; gap: 8px; }

  /* Table */
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 12px 10px; border-bottom: 1px solid var(--border); }
  .data-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text2); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }
  .code-cell { font-family: var(--mono); color: var(--accent); font-size: 13px; }

  /* Progress bar */
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }

  /* Divider */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* Textarea */
  textarea.form-input { resize: vertical; min-height: 100px; font-family: var(--mono); }

  /* Spinner */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Analytics */
  .chart-wrap { position: relative; height: 200px; }
  .breakdown-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { font-size: 13px; color: var(--text2); flex: 1; }
  .breakdown-count { font-family: var(--mono); font-size: 13px; color: var(--text); min-width: 40px; text-align: right; }

  /* Empty state */
  .empty { text-align: center; padding: 48px 20px; }
  .empty i { font-size: 40px; color: var(--text3); margin-bottom: 12px; display: block; }
  .empty p { color: var(--text3); font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Mobile nav trigger + overlay (hidden on desktop) */
  .menu-btn { display: none; background: none; border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: var(--radius); align-items: center; justify-content: center; font-size: 18px; cursor: pointer; flex-shrink: 0; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 998; }
  .sidebar-close-btn { display: none; }

  /* Responsive */
  @media (max-width: 768px) {
    .menu-btn { display: inline-flex; }
    .topbar { padding: 0 16px; gap: 10px; }
    .topbar-title { font-size: 14px; }
    .content { padding: 16px; }

    .sidebar {
      display: flex;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 260px;
      max-width: 80vw;
      z-index: 999;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      box-shadow: 4px 0 24px rgba(0,0,0,0.4);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .sidebar-close-btn { display: inline-flex; align-items: center; justify-content: center; background: none; border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: var(--radius); cursor: pointer; font-size: 16px; }
    .sidebar-brand { display: flex; align-items: center; justify-content: space-between; }

    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    .grid-2 { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }

    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .data-table { min-width: 640px; }

    .auth-card { padding: 24px 20px; }
  }

  @media (max-width: 420px) {
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .stat-value { font-size: 22px; }
  }

  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-family: var(--mono); font-size: 11px; color: var(--text3); }

  /* Password requirements checklist */
  .pw-chk { font-size: 11.5px; color: var(--text3); padding-left: 18px; position: relative; transition: color 0.15s; }
  .pw-chk::before { content: "○"; position: absolute; left: 0; font-size: 10px; top: 1px; }
  .pw-chk.valid { color: var(--green); }
  .pw-chk.valid::before { content: "✓"; }
</style>
</head>
<body>

<div id="auth-screen" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-header">
      <a href="/" style="display:inline-block;margin-bottom:12px;"><div class="brand-icon" style="margin: 0 auto;"><i class="ti ti-link"></i></div></a>
      <h2 style="font-size: 18px; font-weight: 600; margin-bottom: 4px;">Welcome to human.ly</h2>
      <p id="auth-subtitle" style="font-size: 13px; color: var(--text3);">Sign in to access your dashboard</p>
    </div>
    
    <div class="auth-toggle">
      <button id="toggle-login" class="auth-toggle-btn active" onclick="setAuthState('login')">Login</button>
      <button id="toggle-register" class="auth-toggle-btn" onclick="setAuthState('register')">Register</button>
    </div>

    <form id="auth-form" onsubmit="handleAuthSubmit(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;">
          <input type="password" id="auth-password" class="form-input" placeholder="••••••••" style="padding-right:40px;" required />
          <button type="button" id="pw-toggle-btn" onclick="togglePasswordVisibility()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:4px;display:flex;">
            <i class="ti ti-eye" id="pw-toggle-icon"></i>
          </button>
        </div>
        <ul id="pw-checklist" style="list-style:none;margin-top:8px;display:none;flex-direction:column;gap:3px;">
          <li id="chk-len" class="pw-chk">At least 8 characters</li>
          <li id="chk-upper" class="pw-chk">One uppercase letter</li>
          <li id="chk-digit" class="pw-chk">One digit</li>
        </ul>
      </div>
      <button type="submit" id="auth-submit-btn" class="btn btn-primary btn-full" style="margin-top: 8px;">
        Sign In
      </button>
      <div id="auth-error"></div>
    </form>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div>
        <div class="brand-icon"><i class="ti ti-link" aria-hidden="true"></i></div>
        <div class="brand-name">Human.ly</div>
        <div class="brand-sub">URL Shortener</div>
      </div>
      <button class="sidebar-close-btn" onclick="closeSidebar()" aria-label="Close menu"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <button class="nav-item active" onclick="setPage('dashboard')"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard</button>
      <div class="nav-section">Create</div>
      <button class="nav-item" onclick="setPage('shorten')"><i class="ti ti-plus" aria-hidden="true"></i> Shorten URL</button>
      <button class="nav-item" onclick="setPage('bulk')"><i class="ti ti-stack-2" aria-hidden="true"></i> Bulk Create</button>
      <div class="nav-section">Inspect</div>
      <button class="nav-item" onclick="setPage('analytics')"><i class="ti ti-chart-bar" aria-hidden="true"></i> Analytics</button>
      <div class="nav-section">Account</div>
      <button class="nav-item" onclick="handleLogout()" style="color: var(--red);"><i class="ti ti-logout" aria-hidden="true"></i> Logout</button>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;min-width:0;">
        <button class="menu-btn" onclick="openSidebar()" aria-label="Open menu"><i class="ti ti-menu-2" aria-hidden="true"></i></button>
        <div class="topbar-title" id="page-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Dashboard</div>
      </div>
      <div class="topbar-actions">
        <span class="badge badge-green" id="env-badge"><i class="ti ti-circle-filled" style="font-size:8px"></i> v1.0.0</span>
      </div>
    </header>
    <div class="content" id="content-root"></div>
  </div>
</div>

<script>
const API = '';
let currentAuthState = 'login'; // 'login' or 'register'

let currentPage = 'dashboard';
let chartInstance = null;
const navItems = document.querySelectorAll('.nav-item');

/* ───── AUTHENTICATION CLIENT LOGIC ───── */
function checkAuth() {
  const token = localStorage.getItem('auth_token');
  const authScreen = document.getElementById('auth-screen');
  const path = window.location.pathname;

  if (!token) {
    authScreen.style.display = 'flex';
    // Default the tab to match how the visitor arrived (/login vs /register)
    setAuthState(path === '/register' ? 'register' : 'login');
    return;
  }

  authScreen.style.display = 'none';
  // Signed in but sitting on a marketing/auth URL -> normalize to /dashboard
  if (path === '/login' || path === '/register' || path === '/') {
    window.history.replaceState(null, '', '/dashboard');
  }
}

function setAuthState(state) {
  currentAuthState = state;
  const loginBtn = document.getElementById('toggle-login');
  const registerBtn = document.getElementById('toggle-register');
  const submitBtn = document.getElementById('auth-submit-btn');
  const subtitle = document.getElementById('auth-subtitle');
  document.getElementById('auth-error').innerHTML = '';

  const checklist = document.getElementById('pw-checklist');

  if (state === 'login') {
    loginBtn.classList.add('active');
    registerBtn.classList.remove('active');
    submitBtn.textContent = 'Sign In';
    subtitle.textContent = 'Sign in to access your dashboard';
    checklist.style.display = 'none';
  } else {
    registerBtn.classList.add('active');
    loginBtn.classList.remove('active');
    submitBtn.textContent = 'Create Account';
    subtitle.textContent = 'Register an email to start building links';
    checklist.style.display = 'flex';
    updatePasswordChecklist();
  }
}

function togglePasswordVisibility() {
  const input = document.getElementById('auth-password');
  const icon = document.getElementById('pw-toggle-icon');
  const showing = input.type === 'text';
  input.type = showing ? 'password' : 'text';
  icon.className = showing ? 'ti ti-eye' : 'ti ti-eye-off';
}

function updatePasswordChecklist() {
  const value = document.getElementById('auth-password').value;
  const rules = {
    'chk-len': value.length >= 8,
    'chk-upper': /[A-Z]/.test(value),
    'chk-digit': /[0-9]/.test(value),
  };
  let allValid = true;
  for (const [id, passed] of Object.entries(rules)) {
    document.getElementById(id).classList.toggle('valid', passed);
    if (!passed) allValid = false;
  }
  return allValid;
}

document.getElementById('auth-password').addEventListener('input', () => {
  if (currentAuthState === 'register') updatePasswordChecklist();
});

async function handleAuthSubmit(event) {
  event.preventDefault();
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errDiv = document.getElementById('auth-error');
  const submitBtn = document.getElementById('auth-submit-btn');

  errDiv.innerHTML = '';

  if (currentAuthState === 'register' && !updatePasswordChecklist()) {
    errDiv.innerHTML = `<div class="error-box"><i class="ti ti-alert-circle"></i>Password doesn't meet the requirements above.</div>`;
    return;
  }

  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Working…';

  try {
    let data;
    if (currentAuthState === 'login') {
      // Form fields matching OAuth2PasswordRequestForm standard parameters (form-data urlencoded)
      const formDetails = new URLSearchParams();
      formDetails.append('username', email);
      formDetails.append('password', password);

      const res = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formDetails
      });
      data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');
    } else {
      // JSON structure payload matching custom Pydantic schema
      const res = await fetch(API + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      });
      data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Registration failed');
    }

    // Save token received from FastAPI application
    localStorage.setItem('auth_token', data.access_token);
    window.history.replaceState(null, '', '/dashboard');
    checkAuth();
    loadDashboard();
  } catch(e) {
    errDiv.innerHTML = `<div class="error-box"><i class="ti ti-alert-circle"></i>${e.message}</div>`;
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = currentAuthState === 'login' ? 'Sign In' : 'Create Account';
  }
}

function handleLogout() {
  localStorage.removeItem('auth_token');
  // NOTE: link history lives in the database (see GET /links/me), not in
  // localStorage, so there is nothing link-related to clear here anymore.
  window.history.replaceState(null, '', '/login');
  checkAuth();
}

/* ───── MOBILE SIDEBAR DRAWER ───── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* ───── PAGE NAVIGATION ───── */
function setPage(page) {
  currentPage = page;
  navItems.forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(page)) el.classList.add('active');
  });
  const titles = { dashboard: 'Dashboard', shorten: 'Shorten URL', bulk: 'Bulk Create', analytics: 'Analytics' };
  document.getElementById('page-title').textContent = titles[page] || page;
  render(page);
  closeSidebar();
}

function render(page) {
  const root = document.getElementById('content-root');
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const pages = { dashboard: renderDashboard, shorten: renderShorten, bulk: renderBulk, analytics: renderAnalytics };
  if (pages[page]) pages[page](root);
}

/* ───── UPDATED FETCHING UTILITY TO INCLUDE AUTHENTICATION HEADERS ───── */
async function apiFetch(path, opts = {}) {
  const url = API + path;
  const token = localStorage.getItem('auth_token');
  
  const headers = { 
    'Content-Type': 'application/json',
    ...(opts.headers || {})
  };
  
  if (token) {
    headers['Authorization'] = `Bearer ${token}`; // Append standard Bearer Token auth string automatically
  }

  const res = await fetch(url, { ...opts, headers: headers });
  const data = await res.json();
  
  if (res.status === 401) {
    handleLogout(); // Auto boot back to login screen if unauthorized session triggers
    throw new Error("Session expired. Please log back in.");
  }
  
  if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const icon = btn.querySelector('i');
    icon.className = 'ti ti-check';
    btn.style.color = 'var(--green)';
    setTimeout(() => { icon.className = 'ti ti-copy'; btn.style.color = ''; }, 1500);
  });
}

async function loadDashboard() {

    document.getElementById('d-clicks').textContent = totalClicks.toLocaleString();
    const active = links.filter(l => l.is_active).length;
    document.getElementById('d-active').textContent = active;
    document.getElementById('d-avg').textContent = links.length ? Math.round(totalClicks / links.length) : '—';

    if (!wrap) return;
    if (!links.length) {
      wrap.innerHTML = `<div class="empty"><i class="ti ti-link-off"></i><p>No links yet. <a href="#" onclick="setPage('shorten');return false;" style="color:var(--accent)">Create one</a> to get started.</p></div>`;

async function doDelete() {
  const code = document.getElementById('del-code').value.trim();
  if (!code) return;
  const msg = document.getElementById('del-msg');
  msg.innerHTML = '<span class="spinner"></span>';

    loadDashboard();

async function doShorten() {
  const url = document.getElementById('s-url').value.trim();
  if (!url) return;
  const btn = document.getElementById('s-btn');
  const err = document.getElementById('s-error');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating…';
  err.innerHTML = '';
  document.getElementById('s-result').style.display = 'none';

  const body = { original_url: url };
  const alias = document.getElementById('s-alias').value.trim();
  const exp = document.getElementById('s-exp').value;
  const max = document.getElementById('s-max').value;
  if (alias) body.custom_alias = alias;
  if (exp) body.expires_at = new Date(exp).toISOString();
  if (max) body.max_clicks = parseInt(max);

  try {
    const link = await apiFetch('/links', { method: 'POST', body: JSON.stringify(body) });
    document.getElementById('r-short').textContent = link.short_url;
    document.getElementById('r-orig').textContent = link.original_url;
    document.getElementById('r-code').textContent = link.code;
    document.getElementById('r-exp').textContent = link.expires_at ? new Date(link.expires_at).toLocaleDateString() : '—';
    document.getElementById('r-max').textContent = link.max_clicks || '—';
    document.getElementById('s-result').style.display = 'block';
  } catch(e) {
    err.innerHTML = `<div class="error-box"><i class="ti ti-alert-circle"></i>${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-scissors"></i> Shorten';
  }
}

async function doBulk() {
  const raw = document.getElementById('b-urls').value.trim();
  if (!raw) return;
  const urls = raw.split('\n').map(u => u.trim()).filter(Boolean);
  if (!urls.length) return;
  const btn = document.getElementById('b-btn');
  const err = document.getElementById('b-error');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating…';
  err.innerHTML = '';
  document.getElementById('b-result').style.display = 'none';

  const body = { links: urls.map(u => ({ original_url: u })) };
  try {
    const res = await apiFetch('/links/bulk', { method: 'POST', body: JSON.stringify(body) });
    document.getElementById('b-count').textContent = res.created?.length || 0;
    document.getElementById('b-tbody').innerHTML = (res.created || []).map(l =>
      `<tr><td class="code-cell">${l.code}</td><td><span class="tag" style="font-size:11px;">${l.short_url}</span></td><td style="font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l.original_url}</td></tr>`).join('');
    document.getElementById('b-result').style.display = 'flex';
    if (res.failed?.length) {
      document.getElementById('b-fail-count').textContent = res.failed.length;
      document.getElementById('b-fail-tbody').innerHTML = res.failed.map(f =>
        `<tr><td style="font-size:12px;">${f.url}</td><td style="color:var(--red);font-size:12px;">${f.reason}</td></tr>`).join('');
      document.getElementById('b-failed-wrap').style.display = 'block';
    }
  } catch(e) {
    err.innerHTML = `<div class="error-box"><i class="ti ti-alert-circle"></i>${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-stack-2"></i> Create All';
  }
}

async function loadAnalytics(code) {

  } catch(e) {
    out.innerHTML = `<div class="error-box"><i class="ti ti-alert-circle"></i>${e.message}</div>`;

function renderAnalyticsData(out, code, data) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  const totalClicks = data.time_series?.reduce((s, p) => s + p.count, 0) || 0;
  const topCountry = data.top_countries?.[0]?.country || '—';
  const topDevice = data.device_breakdown?.[0]?.device_type || '—';
  const topBrowser = data.browser_breakdown?.[0]?.browser || '—';

  out.innerHTML = `
    <div class="grid-4" style="margin-bottom:16px;">
      <div class="card card-sm"><div class="stat-label">Total Clicks</div><div class="stat-value">${totalClicks.toLocaleString()}</div></div>
      <div class="card card-sm"><div class="stat-label">Top Country</div><div class="stat-value" style="font-size:20px;">${topCountry}</div></div>
      <div class="card card-sm"><div class="stat-label">Top Device</div><div class="stat-value" style="font-size:20px;">${topDevice}</div></div>
      <div class="card card-sm"><div class="stat-label">Top Browser</div><div class="stat-value" style="font-size:18px;font-family:var(--sans)">${topBrowser.split(' ')[0]}</div></div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-header"><span class="card-title-lg">Clicks over time</span><span class="tag">30 days</span></div>
      <div class="chart-wrap"><canvas id="time-chart"></canvas></div>
    </div>

    <div class="grid-3">
      <div class="card">
        <div class="card-title" style="margin-bottom:12px;">By Country</div>
        ${(data.top_countries||[]).slice(0,8).map(c => {
          const pct = totalClicks ? Math.round(c.count / totalClicks * 100) : 0;
          return `<div class="breakdown-row">
            <div class="breakdown-label">${c.country || 'Unknown'}</div>
            <div style="flex:1;margin:0 10px;"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>
            <div class="breakdown-count">${c.count}</div>
          </div>`;
        }).join('') || '<div class="empty" style="padding:20px;"><p>No data yet</p></div>'}
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px;">By Device</div>
        ${(data.device_breakdown||[]).map(d => {
          const pct = totalClicks ? Math.round(d.count / totalClicks * 100) : 0;
          const icon = d.device_type?.toLowerCase() === 'mobile' ? 'ti-device-mobile' : d.device_type?.toLowerCase() === 'tablet' ? 'ti-device-tablet' : 'ti-device-laptop';
          return `<div class="breakdown-row">
            <div class="breakdown-label"><i class="ti ${icon}" style="margin-right:6px;font-size:15px;"></i>${d.device_type||'Unknown'}</div>
            <div style="flex:1;margin:0 10px;"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--green)"></div></div></div>
            <div class="breakdown-count">${d.count}</div>
          </div>`;
        }).join('') || '<div class="empty" style="padding:20px;"><p>No data yet</p></div>'}
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px;">By Browser</div>
        ${(data.browser_breakdown||[]).slice(0,6).map((b,i) => {
          const pct = totalClicks ? Math.round(b.count / totalClicks * 100) : 0;
          const colors = ['var(--accent)','var(--green)','var(--amber)','#a371f7','#f0883e','var(--text3)'];
          return `<div class="breakdown-row">
            <div class="breakdown-label">${b.browser?.split(' ')[0]||'Unknown'}</div>
            <div style="flex:1;margin:0 10px;"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${colors[i%colors.length]}"></div></div></div>
            <div class="breakdown-count">${b.count}</div>
          </div>`;
        }).join('') || '<div class="empty" style="padding:20px;"><p>No data yet</p></div>'}
      </div>
    </div>`;

  if (data.time_series?.length) {
    const ctx = document.getElementById('time-chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.time_series.map(p => new Date(p.date).toLocaleDateString('en-US', {month:'short', day:'numeric'})),
        datasets: [{
          label: 'Clicks',
          data: data.time_series.map(p => p.count),
          backgroundColor: '#58A6FF',
          borderRadius: 4,
          maxBarThickness: 48,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,

            grid: { color: '#21262D' },
